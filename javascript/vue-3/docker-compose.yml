version: '3.8'

services:
  app:
    build: .
    image: javascript/vue-3
    ports:
      - "4001:4001"
    environment:
      - APPSIGNAL_APP_NAME=javascript/vue-3
      - NODE_ENV=test
    env_file:
      # App-local front-end API key (APPSIGNAL_FRONTEND_API_KEY); see README.
      - appsignal_key.env
    volumes:
      - ./app:/app
      - ../integration:/integration
  tests:
    build: ../../support/server-tests
    image: server-tests
    profiles:
      - tests
    depends_on:
      - app
    environment:
      - APP_NAME=javascript/vue-3
      - APP_URL=http://app:4001
