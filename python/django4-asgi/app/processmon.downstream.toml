[[paths_to_watch]]
path = "/app"
ignore = ["__pycache__"]

# Downstream web server on :4002 (no celery here; that is the worker split).
[processes.django]
command = "python3"
args = [
  "-m",
  "uvicorn",
  "appsignal_python_opentelemetry.asgi:application",
  "--host",
  "0.0.0.0"
]
working_dir = "/app"
