version: '3.8'

include:
  - path: ../../support/bot/docker-compose.yml

services:
  postgres:
    image: postgres
    # ports:
    #   - "5432:5432"
    env_file:
      - postgres.env
  redis:
    image: "redis:6.2.7"
    # ports:
    #   - "6379:6379"
  app:
    build: .
    image: python/django5-celery
    depends_on:
      - postgres
      - redis
    ports:
      - "4001:4001"
    env_file:
      - postgres.env
      - ../../appsignal.env
      - ../../appsignal_key.env
    environment:
      - PORT=4001
      - DOWNSTREAM_URL=http://downstream:4002/
      - APPSIGNAL_APP_ENV=dev
      - APPSIGNAL_LOG_LEVEL=trace
    volumes:
      - ./app:/app
      - ../integration:/integration
  # Second instance of the same image (image-only; only `app` builds). Receives
  # the HTTP request the `app` service makes, so the trace continues into it.
  downstream:
    image: python/django5-celery
    command: /commands/run-downstream
    depends_on:
      - postgres
      - redis
    env_file:
      - postgres.env
      - ../../appsignal.env
      - ../../appsignal_key.env
    environment:
      - APPSIGNAL_APP_ENV=dev
      - APPSIGNAL_LOG_LEVEL=trace
    volumes:
      - ./app:/app
      - ../integration:/integration
  # Runs only the background worker (image-only; only `app` builds).
  worker:
    image: python/django5-celery
    command: /commands/run-worker
    depends_on:
      - postgres
      - redis
    env_file:
      - postgres.env
      - ../../appsignal.env
      - ../../appsignal_key.env
    environment:
      - APPSIGNAL_APP_ENV=dev
      - APPSIGNAL_LOG_LEVEL=trace
    volumes:
      - ./app:/app
      - ../integration:/integration
  tests:
    build: ../../support/server-tests
    image: server-tests
    profiles:
      - tests
    depends_on:
      - app
    environment:
      - APP_NAME=python/django5-celery
      - APP_URL=http://app:4001
