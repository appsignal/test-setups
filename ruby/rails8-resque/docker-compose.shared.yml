version: '3.8'

include:
  - path: ../../support/bot/docker-compose.yml

services:
  redis:
    image: "redis:7.4.2"
  app:
    build: .
    image: ruby/rails8-resque
    depends_on:
      - redis
    ports:
      - "4001:4001"
    environment:
      - PORT=4001
    env_file:
      - redis.env
      - ../../appsignal.env
      - ../../appsignal_key.env
    volumes:
      - ./app:/app
      - ../integration:/integration
  # A second instance of the same image, running as a distinct AppSignal app. It
  # drains the `downstream` Resque queue that `app` enqueues to, so the job's
  # trace links back to the enqueuing app (job trace propagation across services).
  downstream:
    image: ruby/rails8-resque
    command: /commands/run-downstream
    depends_on:
      - redis
    env_file:
      - redis.env
      - ../../appsignal.env
      - ../../appsignal_key.env
    volumes:
      - ./app:/app
      - ../integration:/integration
  # Runs only the background worker (see run-worker / processmon.worker.toml).
  # Image-only (no build:) so `docker compose build` does not collide with the
  # app service exporting the same image tag on Docker's containerd store.
  worker:
    image: ruby/rails8-resque
    command: /commands/run-worker
    depends_on:
      - redis
    env_file:
      - redis.env
      - ../../appsignal.env
      - ../../appsignal_key.env
    volumes:
      - ./app:/app
      - ../integration:/integration
  # A second instance of the same image, running as a distinct AppSignal app. It
  # drains the `downstream` Resque queue that `app` enqueues to, so the job's
  # trace links back to the enqueuing app (job trace propagation across services).
  tests:
    build: ../../support/server-tests
    image: server-tests
    profiles:
      - tests
    depends_on:
      - app
    environment:
      - APP_NAME=ruby/rails8-resque
      - APP_URL=http://app:4001
