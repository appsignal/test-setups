version: '3.8'

include:
  - path: ../../support/bot/docker-compose.yml

services:
  postgres:
    image: postgres
    env_file:
      - postgres.env
  app:
    build: .
    image: ruby/rails7-goodjob
    depends_on:
      - postgres
    ports:
      - "4001:4001"
    environment:
      - PORT=4001
    env_file:
      - postgres.env
      - ../../appsignal.env
      - ../../appsignal_key.env
    volumes:
      - ./app:/app
      - ../integration:/integration
  # Runs only the background worker (see run-worker / processmon.worker.toml).
  # Image-only (no build:) so `docker compose build` does not collide with the
  # app service exporting the same image tag on Docker's containerd store.
  worker:
    image: ruby/rails7-goodjob
    command: /commands/run-worker
    depends_on:
      - postgres
    env_file:
      - postgres.env
      - ../../appsignal.env
      - ../../appsignal_key.env
    volumes:
      - ./app:/app
      - ../integration:/integration
  tests:
    build: ../../support/server-tests
    image: server-tests
    profiles:
      - tests
    depends_on:
      - app
    environment:
      - APP_NAME=ruby/rails7-goodjob
      - APP_URL=http://app:4001
