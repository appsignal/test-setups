version: '3.8'

include:
  - path: ../../support/bot/docker-compose.yml

services:
  postgres:
    image: postgres
    env_file:
      - postgres.env
  app:
    build: .
    image: ruby/rails8-que
    depends_on:
      - postgres
    ports:
      - "4001:4001"
    environment:
      - PORT=4001
    env_file:
      - postgres.env
      - ../../appsignal.env
      - ../../appsignal_key.env
    volumes:
      - ./app:/app
      - ../integration:/integration
  # A second instance of the same image, running as a distinct AppSignal app. It
  # drains the `downstream` Que queue that `app` enqueues to, so the job's trace
  # links back to the enqueuing app (job trace propagation across services).
  downstream:
    build: .
    image: ruby/rails8-que
    command: /commands/run-downstream
    depends_on:
      - postgres
    env_file:
      - postgres.env
      - ../../appsignal.env
      - ../../appsignal_key.env
    volumes:
      - ./app:/app
      - ../integration:/integration
  tests:
    build: ../../support/server-tests
    image: server-tests
    profiles:
      - tests
    depends_on:
      - app
    environment:
      - APP_NAME=ruby/rails8-que
      - APP_URL=http://app:4001
