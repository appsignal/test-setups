# Que requires PostgreSQL, so this app talks to the `postgres` service rather
# than the SQLite default the Rails 8 scaffold ships with.
default: &default
  adapter: postgresql
  encoding: unicode
  host: postgres
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  username: app
  password: password

development:
  <<: *default
  database: app_db

test:
  <<: *default
  database: app_db_test

production:
  <<: *default
  database: app_db_production
