version: '3.8'

include:
  - path: ../../support/bot/docker-compose.yml

services:
  motoserver:
    image: motoserver/moto
  app:
    build: .
    platform: "linux/amd64"
    image: ruby/rails6-shoryuken
    depends_on:
      - motoserver
    ports:
      - "4001:4001"
    environment:
      - PORT=4001
    env_file:
      - shoryuken.env
      - ../../appsignal.env
      - ../../appsignal_key.env
    volumes:
      - ./app:/app
      - ../integration:/integration
  # A second instance of the same image, running as a distinct AppSignal app. It
  # drains the `downstream` SQS queue that `app` enqueues to, so the job's trace
  # links back to the enqueuing app (job trace propagation across services).
  downstream:
    build: .
    platform: "linux/amd64"
    image: ruby/rails6-shoryuken
    command: /commands/run-downstream
    depends_on:
      - motoserver
    env_file:
      - shoryuken.env
      - ../../appsignal.env
      - ../../appsignal_key.env
    volumes:
      - ./app:/app
      - ../integration:/integration
  tests:
    build: ../../support/server-tests
    image: server-tests
    profiles:
      - tests
    depends_on:
      - app
    environment:
      - APP_NAME=ruby/rails6-shoryuken
      - APP_URL=http://app:4001
