[[paths_to_watch]]
path = "/app"
ignore = ["tmp", "log", "public/packs", "node_modules/.cache"]

[[paths_to_watch]]
path = "/integration"

# The worker service runs only the background job processor. Jobs enqueued by
# the web `app` service are performed here, so the job's trace runs under the
# worker's own app name (agent mode) or `worker` service name (collector mode),
# linked back to the enqueue span in `app`.
[processes.shoryuken]
command = "bundle"
args = [
  "exec",
  "shoryuken",
  "-q=default",
  "-q=native",
  "-q=batched",
  "-R"
]
working_dir = "/app"
